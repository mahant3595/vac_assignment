<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Login Portal</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#004080,#0073e6);
    }

    .login-container{
        background:#fff;
        width:380px;
        padding:35px;
        border-radius:15px;
        box-shadow:0 10px 25px rgba(0,0,0,0.2);
        text-align:center;
    }

    .logo{
        width:100px;
        height:100px;
        margin:0 auto 15px;
        border-radius:50%;
        overflow:hidden;
        border:3px solid #004080;
    }

    .logo img{
        width:100%;
        height:100%;
        object-fit:cover;
    }

    h2{
        color:#004080;
        margin-bottom:5px;
    }

    .subtitle{
        color:#666;
        font-size:14px;
        margin-bottom:25px;
    }

    .input-group{
        margin-bottom:15px;
        text-align:left;
    }

    .input-group label{
        display:block;
        margin-bottom:5px;
        color:#333;
        font-weight:bold;
    }

    .input-group input{
        width:100%;
        padding:12px;
        border:1px solid #ccc;
        border-radius:8px;
        outline:none;
    }

    .input-group input:focus{
        border-color:#0073e6;
    }

    .login-btn{
        width:100%;
        padding:12px;
        background:#004080;
        color:white;
        border:none;
        border-radius:8px;
        font-size:16px;
        cursor:pointer;
        transition:0.3s;
    }

    .login-btn:hover{
        background:#0066cc;
    }

    .footer{
        margin-top:15px;
        font-size:13px;
        color:#666;
    }
</style>
</head>
<body>

<div class="login-container">

    <!-- Replace logo.png with your college logo -->
    <div class="logo">
        <img src="logo.jpg" alt="College Logo">
    </div>

    <h2>ABC College</h2>
    <p class="subtitle">Student Login Portal</p>

    <form>
        <div class="input-group">
            <label>Student ID</label>
            <input type="text" placeholder="Enter Student ID" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Enter Password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="footer">
        © 2026 ABC College. All Rights Reserved.
    </div>

</div>

</body>
</html>
