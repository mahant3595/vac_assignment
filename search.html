<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f4f4f4;
        }

        .search-box {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            width: 300px;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            background: #0078ff;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <form action="https://formsubmit.co/mahant.25bscit@kprcas.ac.in" method="POST">
        <div class="search-box">
            <input
                type="text"
                name="search_query"
                placeholder="Search..."
                required
            >
            <button type="submit">Search</button>
        </div>

        <!-- Optional settings -->
        <input type="hidden" name="_subject" value="New Search Query">
        <input type="hidden" name="_captcha" value="false">
    </form>

</body>
</html>
